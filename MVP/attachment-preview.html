<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - 添付プレビュー</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="topnav">
        <div class="brand" style="flex-direction:column; align-items:flex-start; gap:4px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="pill">Preview</div>
            <div>添付プレビュー</div>
          </div>
          <div class="breadcrumb">案件一覧 / 添付プレビュー</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <button class="btn back" type="button" onclick="window.history.back()">戻る</button>
          <div class="muted small">案件ID：<span id="caseIdLabel">000000</span></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">画像プレビュー（途中写真）</div>
        <div class="panel-body">
          <div class="section-title">表示（サンプル）</div>
          <div class="thumb" style="min-height: 260px;">
            <img
              alt="拡大プレビュー"
              style="height: 190px;"
              src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='900' height='360'><rect width='900' height='360' fill='%23111b2f'/><text x='40' y='190' fill='%239fb0d0' font-size='24'>途中写真（拡大）</text><text x='40' y='250' fill='%235aa2ff' font-size='14'>プロトタイプ表示</text></svg>"
            />
          </div>
          <div class="btnbar">
            <a class="btn" href="#" onclick="alert('プロトタイプ：前へ/次へはありません。'); return false;">前へ</a>
            <a class="btn" href="#" onclick="alert('プロトタイプ：前へ/次へはありません。'); return false;">次へ</a>
            <a class="btn" href="javascript:history.back()">戻る</a>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">PDFプレビュー（見積/納品）</div>
        <div class="panel-body">
          <div class="muted small">
            実装時はPDFの埋め込み or 新規タブ表示を想定。
          </div>
          <div class="btnbar">
            <button class="btn primary" type="button" onclick="alert('プロトタイプ：PDFプレビューしません。')">PDFを表示</button>
            <button class="btn" type="button" onclick="alert('プロトタイプ：ダウンロードしません。')">ダウンロード</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
