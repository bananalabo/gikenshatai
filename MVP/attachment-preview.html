<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>添付プレビュー — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body
    data-walkthrough-key="attachment-preview"
    data-walkthrough-target="#previewPdfBtn"
    data-walkthrough-title="添付を確認する"
    data-walkthrough-text="光っている「PDFを表示」をタップして添付内容を確認します。"
  >

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="mobile-header__back" type="button" onclick="history.back()" aria-label="戻る">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="mobile-header__title">添付プレビュー</span>
      <div class="mobile-header__action">
        <span class="muted small">案件 #<span id="caseIdLabel">000000</span></span>
      </div>
    </header>

    <div class="app app--simple">

      <!-- TOPNAV (desktop) -->
      <div class="topnav">
        <div class="brand">
          <div class="brand-col">
            <div class="brand-row">
              <span class="pill">Preview</span>
              <span>添付プレビュー</span>
            </div>
            <span class="breadcrumb">案件詳細 / 添付プレビュー</span>
          </div>
        </div>
        <div class="topnav-actions">
          <button class="btn back" type="button" onclick="history.back()">戻る</button>
          <span class="muted small">案件ID：<span id="caseIdLabelDesktop">000000</span></span>
        </div>
      </div>

      <!-- Image preview -->
      <div class="panel">
        <div class="panel-header">画像プレビュー（途中写真）</div>
        <div class="panel-body">
          <div class="section-title">表示（サンプル）</div>
          <div class="thumb" style="min-height:220px; cursor:default;">
            <img
              alt="拡大プレビュー"
              style="height:160px; width:100%; object-fit:contain; border-radius:10px;"
              src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='900' height='360'><rect width='900' height='360' fill='%231d1d1f'/><text x='40' y='190' fill='%236b6b73' font-size='24'>途中写真（拡大）</text><text x='40' y='230' fill='%235aa2ff' font-size='14'>プロトタイプ表示</text></svg>"
            />
          </div>
          <div class="btnbar">
            <button class="btn" type="button" onclick="window.mvpNotify && window.mvpNotify('前後移動はデモでは省略しています', 'info')">← 前へ</button>
            <button class="btn" type="button" onclick="window.mvpNotify && window.mvpNotify('前後移動はデモでは省略しています', 'info')">次へ →</button>
            <button class="btn" type="button" onclick="history.back()">戻る</button>
          </div>
        </div>
      </div>

      <!-- PDF preview -->
      <div class="panel">
        <div class="panel-header">PDFプレビュー（見積 / 納品書）</div>
        <div class="panel-body">
          <p class="muted small" style="margin:0 0 14px;">
            実装時はPDFの埋め込みまたは新規タブ表示を想定。
          </p>
          <div class="btnbar">
            <button class="btn primary" id="previewPdfBtn" type="button" onclick="window.mvpNotify && window.mvpNotify('PDFプレビューを開きました', 'info')">PDFを表示</button>
            <button class="btn" type="button" onclick="window.mvpNotify && window.mvpNotify('ダウンロードはデモでは省略しています', 'info')">ダウンロード</button>
          </div>
          <p class="demo-note" style="margin-top:12px;">Demo mode: 添付データはサンプルです</p>
        </div>
      </div>

    </div>

    <script>
      (function () {
        const caseId = new URLSearchParams(window.location.search).get("caseId") || "000000";
        const labels = document.querySelectorAll("#caseIdLabel, #caseIdLabelDesktop");
        labels.forEach(el => { el.textContent = caseId; });
      })();
    </script>
  </body>
</html>
