<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - 管理者案件詳細</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body>
    <script>
      // Compatibility redirect: role pages now live under ./admin/.
      (function () {
        window.location.replace("./admin/admin-case-detail.html" + window.location.search);
      })();
    </script>
    <script>
      // Deprecated page: redirect to the shared one-page case detail.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var caseId = params.get("caseId") || "000000";
        var org = params.get("org") || "Honda（例）";
        window.location.href =
          "./case-detail.html?role=admin&caseId=" +
          encodeURIComponent(caseId) +
          "&org=" +
          encodeURIComponent(org);
      })();
    </script>
    <div class="app">
      <div class="topnav">
        <div class="brand">
          <div class="pill">Admin</div>
          <div>案件詳細</div>
        </div>
        <div class="muted small">組織：<span id="orgLabel">Honda（例）</span></div>
      </div>

      <div class="panel">
        <div class="panel-header">案件ヘッダ</div>
        <div class="panel-body">
          <div class="grid-2">
            <div>
              <div class="section-title">案件ID</div>
              <div style="font-size:22px; font-weight:800;" id="caseIdLabel">000012</div>
              <div class="muted small">（クエリパラメータで更新）</div>
            </div>
            <div>
              <div class="section-title">関連先</div>
              <div style="font-weight:700;">Honda（例）</div>
              <div style="margin-top:10px;">
                <span class="status-badge"><span class="dot"></span>見積済</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">所定欄（PDFなど）</div>
          <div class="panel-body">
            <div class="section-title">見積PDF</div>
            <div class="muted small">サンプル：見積_000012.pdf</div>
            <div class="btnbar">
              <button class="btn" type="button">アップロード/差し替え（運用）</button>
            </div>
            <div class="divider"></div>
            <div class="section-title">納品書PDF</div>
            <div class="muted small">サンプル：納品書_000012.pdf</div>
            <div class="btnbar">
              <button class="btn" type="button">アップロード/差し替え（運用）</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">ステータス更新（管理者）</div>
          <div class="panel-body">
            <div class="proto-field">
              <span class="proto-bubble">ステータスを選択して更新</span>
              <label>新しいステータス</label>
              <select>
                <option>受付</option>
                <option>確認中</option>
                <option>見積済</option>
                <option>作業中</option>
                <option>納品済</option>
                <option>完了</option>
              </select>
            </div>
            <div class="btnbar">
              <button class="btn success" type="button" onclick="alert('プロトタイプ：保存しません。')">更新する</button>
              <a class="btn" href="./admin-cases.html">案件一覧へ</a>
            </div>
            <p class="muted small" style="margin-top:12px;">
              ※この画面はUIプロトタイプです。保存処理はありません。
            </p>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">途中写真（複数）</div>
        <div class="panel-body">
          <div class="case-photo">
            <div class="thumb">
              <img alt="途中写真サンプル" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='120'><rect width='240' height='120' fill='%23111b2f'/><text x='12' y='66' fill='%239fb0d0' font-size='14'>写真1</text></svg>" />
              <div class="muted small" style="margin-top:8px;">撮影 2026/04/xx</div>
              <div class="btnbar" style="margin-top:8px;">
                <a class="btn" href="./attachment-preview.html?caseId=000012&type=progress&idx=1">プレビュー</a>
              </div>
            </div>
            <div class="thumb">
              <img alt="途中写真サンプル" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='120'><rect width='240' height='120' fill='%23111b2f'/><text x='12' y='66' fill='%239fb0d0' font-size='14'>写真2</text></svg>" />
              <div class="muted small" style="margin-top:8px;">撮影 2026/04/xx</div>
              <div class="btnbar" style="margin-top:8px;">
                <a class="btn" href="./attachment-preview.html?caseId=000012&type=progress&idx=2">プレビュー</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
