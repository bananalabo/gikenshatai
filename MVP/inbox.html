<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - インボックス</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-card">
            <div class="sidebar-header">
              <div class="sidebar-title" id="rolePill">Role</div>
              <p class="sidebar-subtitle">組織：<span id="orgLabel">Honda（例）</span></p>
            </div>
            <nav class="nav">
              <div class="nav-group">
                <div class="nav-group-title">業務</div>
                <a class="nav-item" id="navCaseListLink" href="#">案件一覧</a>
                <a class="nav-item" id="navVendorsLink" href="#">取引先</a>
                <a class="nav-item role-user-only" id="navNewCaseLink" href="#">新規依頼</a>
              </div>
              <div class="nav-group">
                <div class="nav-group-title">連絡</div>
                <a class="nav-item active" id="navInboxLink" href="./inbox.html?role=user&org=Honda（例）">インボックス <span class="badge">2</span></a>
              </div>
            </nav>
          </div>
        </aside>

        <main class="main">
          <div class="topnav">
            <div class="brand" style="flex-direction:column; align-items:flex-start; gap:4px;">
              <div>インボックス</div>
              <div class="breadcrumb">連絡 / インボックス</div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="btn back" type="button" onclick="window.history.back()">戻る</button>
              <div class="muted small">ログアウト（表示用）</div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header">メッセージ一覧（サンプル）</div>
            <div class="panel-body">
              <div class="grid-2" style="grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn" type="button" onclick="alert('未読フィルタ（プロトタイプ）')">未読</button>
                <button class="btn" type="button" onclick="alert('全件（プロトタイプ）')">全て</button>
              </div>

              <div class="divider"></div>

              <div>
                <table>
                  <thead>
                    <tr>
                      <th style="width:120px;">ステータス</th>
                      <th>件名</th>
                      <th style="width:110px;">案件ID</th>
                      <th style="width:140px;"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>未読</td>
                      <td>見積PDFの差し替えについて</td>
                      <td>000012</td>
                      <td>
                        <a class="btn" href="./inbox-thread.html?role=user&threadId=t001&org=Honda（例）&caseId=000012">開く</a>
                      </td>
                    </tr>
                    <tr>
                      <td>未読</td>
                      <td>途中写真の追加依頼</td>
                      <td>000102</td>
                      <td>
                        <a class="btn" href="./inbox-thread.html?role=user&threadId=t002&org=Honda（例）&caseId=000102">開く</a>
                      </td>
                    </tr>
                    <tr>
                      <td>既読</td>
                      <td>完了報告の確認</td>
                      <td>000013</td>
                      <td>
                        <a class="btn" href="./inbox-thread.html?role=user&threadId=t003&org=Honda（例）&caseId=000013">開く</a>
                      </td>
                    </tr>
                  </tbody>
                </table>

                <p class="muted small" style="margin-top:12px;">
                  ※この画面はプロトタイプです。実データはありません。
                </p>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // Fix hrefs based on role/org query params (prototype only).
      (function () {
        const params = new URLSearchParams(window.location.search);
        const role = params.get("role") || "user";
        const org = params.get("org") || "Honda（例）";

        const navCaseListLink = document.getElementById("navCaseListLink");
        if (navCaseListLink) {
          navCaseListLink.href =
            role === "admin"
              ? "./admin/admin-cases.html?role=admin&org=" + encodeURIComponent(org)
              : "./user/user-cases.html?role=user&org=" + encodeURIComponent(org);
        }

        // Update thread links so role/org stay consistent.
        document.querySelectorAll("a[href*='inbox-thread.html']").forEach((a) => {
          const url = new URL(a.href);
          url.searchParams.set("role", role);
          url.searchParams.set("org", org);
          a.href = url.toString();
        });

        // Update active inbox link
        document.querySelectorAll("a.nav-item.active").forEach((a) => {
          const url = new URL(a.href, window.location.href);
          url.searchParams.set("role", role);
          url.searchParams.set("org", org);
          a.href = url.toString();
        });
      })();
    </script>
  </body>
</html>
