<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>案件詳細（管理者）— 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <script>
      (function () {
        var p      = new URLSearchParams(window.location.search);
        var caseId = p.get("caseId") || "000000";
        var org    = p.get("org")    || "元請け";
        window.location.replace(
          "../case-detail.html?role=admin&caseId=" +
          encodeURIComponent(caseId) + "&org=" + encodeURIComponent(org)
        );
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=../case-detail.html?role=admin" />
    </noscript>
  </body>
</html>
