<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - ステータス更新</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../mvp.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="topnav">
        <div class="brand" style="flex-direction:column; align-items:flex-start; gap:4px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="pill">Admin</div>
            <div>ステータス更新</div>
          </div>
          <div class="breadcrumb">案件一覧 / ステータス更新</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <button class="btn back" type="button" onclick="window.history.back()">戻る</button>
          <div class="muted small">案件ID：<span id="caseIdLabel">000000</span></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">新しいステータスを選択</div>
        <div class="panel-body">
          <div class="grid-2">
            <div class="proto-field">
              <span class="proto-bubble">現在のステータス（参照のみ）</span>
              <label>現在ステータス（サンプル）</label>
              <input type="text" value="確認中" disabled />
            </div>
            <div class="proto-field">
              <span class="proto-bubble">変更後のステータスを選択</span>
              <label>更新先</label>
              <select>
                <option>受付</option>
                <option>確認中</option>
                <option>見積済</option>
                <option>作業中</option>
                <option>納品済</option>
                <option>完了</option>
              </select>
            </div>
          </div>

          <div class="btnbar">
            <button class="btn success" type="button" onclick="alert('プロトタイプ：保存しません。')">更新する</button>
            <a class="btn" href="./admin-cases.html?role=admin&org=元請け">案件一覧へ</a>
          </div>
          <p class="muted small" style="margin-top:12px;">
            ※MVPの実装時に管理者のみ更新可能にする前提。
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
