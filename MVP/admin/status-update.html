<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ステータス更新 — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../mvp.js"></script>
  </head>
  <body>

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="mobile-header__back" type="button" onclick="history.back()" aria-label="戻る">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="mobile-header__title">ステータス更新</span>
      <div class="mobile-header__action">
        <span class="muted small" style="font-size:12px;">案件 #<span id="caseIdLabel">000000</span></span>
      </div>
    </header>

    <div class="app app--simple">

      <!-- TOPNAV (desktop) -->
      <div class="topnav">
        <div class="brand">
          <div class="brand-col">
            <div class="brand-row">
              <span class="pill">Admin</span>
              <span>ステータス更新</span>
            </div>
            <span class="breadcrumb">案件一覧 / ステータス更新</span>
          </div>
        </div>
        <div class="topnav-actions">
          <button class="btn back" type="button" onclick="history.back()">戻る</button>
          <span class="muted small">案件ID：<span id="caseIdLabelDesktop">000000</span></span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">新しいステータスを選択</div>
        <div class="panel-body">
          <div class="grid-2">
            <div class="proto-field">
              <span class="proto-bubble">現在のステータス（参照のみ）</span>
              <label>現在ステータス（サンプル）</label>
              <input type="text" value="確認中" disabled />
            </div>
            <div class="proto-field">
              <span class="proto-bubble">変更後のステータスを選択</span>
              <label>更新先</label>
              <select>
                <option>受付</option>
                <option>確認中</option>
                <option>見積済</option>
                <option>作業中</option>
                <option>納品済</option>
                <option>完了</option>
              </select>
            </div>
          </div>

          <div class="page-actions">
            <button class="btn success btn--full" type="button" onclick="window.mvpNotify && window.mvpNotify('ステータスを更新しました', 'success')">
              更新する
            </button>
            <a class="btn btn--full" id="backToCasesBtn" href="./admin-cases.html?role=admin&org=元請け">
              案件一覧へ戻る
            </a>
          </div>

          <p class="demo-note" style="margin-top:14px;">
            Demo mode: 更新内容は保存されません
          </p>
        </div>
      </div>

    </div>

    <script>
      (function () {
        const p      = new URLSearchParams(window.location.search);
        const caseId = p.get("caseId") || "000000";
        const org    = p.get("org")    || "元請け";

        document.querySelectorAll("#caseIdLabel, #caseIdLabelDesktop").forEach(el => {
          el.textContent = caseId;
        });

        const backBtn = document.getElementById("backToCasesBtn");
        if (backBtn) {
          backBtn.href = window.buildMvpHref
            ? window.buildMvpHref("./admin-cases.html", { role: "admin", org: org })
            : "./admin-cases.html?role=admin&org=" + encodeURIComponent(org);
        }
      })();
    </script>
  </body>
</html>
