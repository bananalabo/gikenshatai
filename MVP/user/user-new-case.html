<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規依頼 — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../mvp.js"></script>
  </head>
  <body
    data-walkthrough-key="user-new-case"
    data-walkthrough-target='[data-walkthrough-target="create-case"]'
    data-walkthrough-title="案件を作成する"
    data-walkthrough-text="入力後は、光っている「作成する」をタップして案件を登録します。"
  >

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="mobile-header__back" type="button" onclick="history.back()" aria-label="戻る">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="mobile-header__title">新規依頼</span>
      <div class="mobile-header__action"></div>
    </header>

    <div class="app">
      <div class="layout">

        <!-- SIDEBAR (desktop) -->
        <aside class="sidebar">
          <div class="sidebar-card">
            <div class="sidebar-header">
              <div class="sidebar-title">User</div>
              <p class="sidebar-subtitle">組織：<span id="orgLabel">Honda（例）</span></p>
            </div>
            <nav class="nav">
              <div class="nav-group">
                <div class="nav-group-title">業務</div>
                <a class="nav-item" id="navCaseListLink" href="#">案件一覧</a>
                <a class="nav-item" id="navVendorsLink" href="#">取引先</a>
                <a class="nav-item active" id="navNewCaseLink" href="#">新規依頼</a>
              </div>
              <div class="nav-group">
                <div class="nav-group-title">連絡</div>
                <a class="nav-item" id="navInboxLink" href="#">
                  受信箱 <span class="badge">2</span>
                </a>
              </div>
            </nav>
          </div>
        </aside>

        <main class="main">

          <!-- TOPNAV (desktop) -->
          <div class="topnav">
            <div class="brand">
              <div class="brand-col">
                <span>新規依頼</span>
                <span class="breadcrumb">案件一覧 / 新規依頼</span>
              </div>
            </div>
            <div class="topnav-actions">
              <button class="btn back" type="button" onclick="history.back()">戻る</button>
            </div>
          </div>

          <!-- Form -->
          <div class="panel">
            <div class="panel-header">新規依頼（必須項目のみ）</div>
            <div class="panel-body">
              <div class="grid-2">
                <div class="proto-field">
                  <label>関連先名（顧客/依頼元）</label>
                  <input id="newCaseCustomer" type="text" placeholder="例：Honda" />
                </div>
                <div class="proto-field">
                  <label>依頼日</label>
                  <input id="newCaseDate" type="date" />
                </div>
              </div>

              <details style="margin-top:14px;">
                <summary class="muted small" style="cursor:pointer; font-weight:600;">任意項目を追加（備考）</summary>
                <div class="proto-field" style="margin-top:10px;">
                  <label>備考（任意）</label>
                  <textarea id="newCaseNote" placeholder="例：見積に必要な情報、特記事項など"></textarea>
                </div>
              </details>

              <p class="demo-note" style="margin-top:12px;">
                Demo mode: 「下書き保存」でこのブラウザにのみ保存（作成するまでサーバーには送りません）
              </p>
            </div>
          </div>

          <!-- Desktop button bar -->
          <div class="btnbar" style="display:none;" id="desktopBtnbar">
            <button class="btn success" data-walkthrough-target="create-case" type="button" onclick="fakeCreate()">作成する</button>
            <button class="btn" type="button" id="newCaseDraftBtn">下書き保存</button>
            <a class="btn" id="backToCasesBtn" href="./user-cases.html?role=user&org=Honda">戻る</a>
          </div>

        </main>
      </div>
    </div>

    <!-- Sticky bottom CTA (mobile) -->
    <div class="page-actions" id="mobileBtnArea"
         style="position:fixed; bottom:calc(var(--bottom-nav-h) + 8px); left:16px; right:16px; z-index:150;">
      <button class="btn success btn--full" data-walkthrough-target="create-case" type="button" onclick="fakeCreate()">作成する</button>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottomNav">
      <a class="bottom-nav__item" id="bnCaseList" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span>案件一覧</span>
      </a>
      <a class="bottom-nav__item active" id="bnNewCase" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        <span>新規依頼</span>
      </a>
      <a class="bottom-nav__item" id="bnInbox" href="#">
        <span class="bn-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="bn-badge">2</span>
        </span>
        <span>受信箱</span>
      </a>
      <a class="bottom-nav__item" id="bnVendors" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>取引先</span>
      </a>
    </nav>

    <script>
      (function () {
        const orgRaw = new URLSearchParams(window.location.search).get("org") || "Honda";
        const org = window.normalizeOrgName ? window.normalizeOrgName(orgRaw) : orgRaw;
        const backBtn = document.getElementById("backToCasesBtn");
        if (backBtn) backBtn.href = window.buildMvpHref
          ? window.buildMvpHref("./user-cases.html", { role: "user", org: org })
          : "./user-cases.html?role=user&org=" + encodeURIComponent(org);
      })();

      (function draftLocal() {
        var KEY = "mvp_new_case_draft_v1";
        var customer = document.getElementById("newCaseCustomer");
        var dateEl = document.getElementById("newCaseDate");
        var note = document.getElementById("newCaseNote");
        var draftBtn = document.getElementById("newCaseDraftBtn");
        try {
          var raw = localStorage.getItem(KEY);
          if (raw) {
            var d = JSON.parse(raw);
            if (customer && d.customer) customer.value = d.customer;
            if (dateEl && d.date) dateEl.value = d.date;
            if (note && d.note) note.value = d.note;
          }
        } catch (e) {}
        if (draftBtn) {
          draftBtn.addEventListener("click", function () {
            var payload = {
              customer: customer ? customer.value : "",
              date: dateEl ? dateEl.value : "",
              note: note ? note.value : "",
              savedAt: Date.now(),
            };
            try {
              localStorage.setItem(KEY, JSON.stringify(payload));
            } catch (e) {}
            if (window.mvpNotify) window.mvpNotify("下書きを保存しました（このブラウザのみ）", "info");
          });
        }
      })();

      // Show desktop btn bar on ≥900px
      (function () {
        function checkLayout() {
          const desktopBar = document.getElementById("desktopBtnbar");
          const mobileCta  = document.getElementById("mobileBtnArea");
          if (!desktopBar || !mobileCta) return;
          if (window.innerWidth >= 900) {
            desktopBar.style.display = "flex";
            mobileCta.style.display  = "none";
          } else {
            desktopBar.style.display = "none";
            mobileCta.style.display  = "flex";
          }
        }
        checkLayout();
        window.addEventListener("resize", checkLayout);
      })();

      function fakeCreate() {
        const orgRaw = new URLSearchParams(window.location.search).get("org") || "Honda";
        const org = window.normalizeOrgName ? window.normalizeOrgName(orgRaw) : orgRaw;
        if (window.mvpNotify) window.mvpNotify("案件を作成しました", "success");
        window.setTimeout(() => {
          window.location.href = window.buildMvpHref
            ? window.buildMvpHref("../case-detail.html", { role: "user", caseId: "000201", org: org })
            : "../case-detail.html?role=user&caseId=000201&org=" + encodeURIComponent(org);
        }, 140);
      }
    </script>
  </body>
</html>
