<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>案件詳細 — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <script>
      (function () {
        var p      = new URLSearchParams(window.location.search);
        var caseId = p.get("caseId") || "000000";
        var org    = p.get("org")    || "Honda（例）";
        window.location.replace(
          "../case-detail.html?role=user&caseId=" +
          encodeURIComponent(caseId) + "&org=" + encodeURIComponent(org)
        );
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=../case-detail.html?role=user" />
    </noscript>
  </body>
</html>
