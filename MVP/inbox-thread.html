<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>メッセージ — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body>

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="mobile-header__back" type="button" onclick="history.back()" aria-label="戻る">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="mobile-header__title" id="mobileThreadTitle">メッセージ</span>
      <div class="mobile-header__action"></div>
    </header>

    <div class="app">
      <div class="layout">

        <!-- SIDEBAR (desktop) -->
        <aside class="sidebar">
          <div class="sidebar-card">
            <div class="sidebar-header">
              <div class="sidebar-title" id="rolePill">Role</div>
              <p class="sidebar-subtitle">組織：<span id="orgLabel">Honda（例）</span></p>
            </div>
            <nav class="nav">
              <div class="nav-group">
                <div class="nav-group-title">業務</div>
                <a class="nav-item" id="navCaseListLink" href="#">案件一覧</a>
                <a class="nav-item" id="navVendorsLink" href="#">取引先</a>
                <a class="nav-item role-user-only" id="navNewCaseLink" href="#">新規依頼</a>
              </div>
              <div class="nav-group">
                <div class="nav-group-title">連絡</div>
                <a class="nav-item active" id="navInboxLink" href="#">受信箱</a>
              </div>
            </nav>
          </div>
        </aside>

        <main class="main">

          <!-- TOPNAV (desktop) -->
          <div class="topnav">
            <div class="brand">
              <div class="brand-col">
                <span>メッセージ</span>
                <span class="breadcrumb">受信箱 / メッセージ</span>
              </div>
            </div>
            <div class="topnav-actions">
              <button class="btn back" type="button" onclick="history.back()">戻る</button>
              <a class="btn" id="backToInboxBtn" href="./inbox.html">一覧へ戻る</a>
            </div>
          </div>

          <!-- Thread info -->
          <div class="panel">
            <div class="panel-header">スレッド（サンプル）</div>
            <div class="panel-body">
              <p class="muted small" style="margin:0 0 14px;">
                案件ID：<strong id="caseIdLabel">000000</strong>
              </p>

              <!-- Messages -->
              <div class="msg-list">
                <div class="msg-bubble msg-bubble--in">
                  <div class="msg-sender">相手</div>
                  見積PDFを差し替えました。ご確認お願いします。
                </div>
                <div class="msg-bubble msg-bubble--out">
                  <div class="msg-sender">あなた</div>
                  確認します。反映までの予定も共有いただけますか？
                </div>
                <div class="msg-bubble msg-bubble--in">
                  <div class="msg-sender">相手</div>
                  次のステータスは作業中に更新予定です（明日AM）。
                </div>
              </div>

              <div class="divider"></div>

              <!-- Reply -->
              <div class="proto-field">
                <span class="proto-bubble">返信文を入力（デモ・送信内容は保存されません）</span>
                <label>返信</label>
                <textarea placeholder="メッセージを入力"></textarea>
              </div>
              <div class="btnbar" style="margin-top:10px;">
                <button class="btn primary" type="button" onclick="window.mvpNotify && window.mvpNotify('返信を送信しました', 'success')">送信</button>
              </div>

              <p class="demo-note" style="margin-top:14px;">
                Demo mode: 送信内容は保存されません
              </p>
            </div>
          </div>

        </main>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottomNav">
      <a class="bottom-nav__item" id="bnCaseList" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span>案件一覧</span>
      </a>
      <a class="bottom-nav__item role-user-only" id="bnNewCase" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        <span>新規依頼</span>
      </a>
      <a class="bottom-nav__item active" id="bnInbox" href="#">
        <span class="bn-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span>受信箱</span>
      </a>
      <a class="bottom-nav__item" id="bnVendors" href="#">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>取引先</span>
      </a>
    </nav>

    <script>
      (function () {
        const params   = new URLSearchParams(window.location.search);
        const role     = params.get("role")     || "user";
        const org      = params.get("org")      || "Honda";
        const caseId   = params.get("caseId")   || "000000";

        const caseLabel = document.getElementById("caseIdLabel");
        if (caseLabel) caseLabel.textContent = caseId;

        const mobileTitle = document.getElementById("mobileThreadTitle");
        if (mobileTitle) mobileTitle.textContent = "案件 #" + caseId;

        const backToInboxBtn = document.getElementById("backToInboxBtn");
        if (backToInboxBtn) {
          backToInboxBtn.href = "./inbox.html?role=" + encodeURIComponent(role) + "&org=" + encodeURIComponent(org);
        }
      })();
    </script>
  </body>
</html>
