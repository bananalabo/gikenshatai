<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - メッセージ</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-card">
            <div class="sidebar-header">
              <div class="sidebar-title" id="rolePill">Role</div>
              <p class="sidebar-subtitle">組織：<span id="orgLabel">Honda（例）</span></p>
            </div>
            <nav class="nav">
              <div class="nav-group">
                <div class="nav-group-title">業務</div>
                <a class="nav-item" id="navCaseListLink" href="#">案件一覧</a>
                <a class="nav-item" id="navVendorsLink" href="#">取引先</a>
                <a class="nav-item role-user-only" id="navNewCaseLink" href="#">新規依頼</a>
              </div>
              <div class="nav-group">
                <div class="nav-group-title">連絡</div>
                <a class="nav-item active" id="navInboxLink" href="#">インボックス</a>
              </div>
            </nav>
          </div>
        </aside>
        <main class="main">
          <div class="topnav">
            <div class="brand" style="flex-direction:column; align-items:flex-start; gap:4px;">
              <div>メッセージ</div>
              <div class="breadcrumb">インボックス / メッセージ</div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="btn back" type="button" onclick="window.history.back()">戻る</button>
              <a class="btn" id="backToInboxBtn" href="./inbox.html">一覧へ戻る</a>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header">スレッド（サンプル）</div>
            <div class="panel-body">
              <div class="muted small">
                案件ID：<span id="caseIdLabel">000000</span> / threadId：
                <span id="threadIdLabel">t000</span>
              </div>

              <div class="divider"></div>

              <div style="display:flex; flex-direction:column; gap: 12px;">
                <div style="align-self:flex-start; background:#f7f7f8; border:1px solid var(--border); border-radius: 12px; padding: 12px 14px; max-width: 80%;">
                  <div class="small muted">相手</div>
                  <div style="margin-top:6px;">見積PDFを差し替えました。ご確認お願いします。</div>
                </div>
                <div style="align-self:flex-end; background: rgba(0,122,255,0.08); border:1px solid rgba(0,122,255,0.25); border-radius: 12px; padding: 12px 14px; max-width: 80%;">
                  <div class="small muted">あなた</div>
                  <div style="margin-top:6px;">確認します。反映までの予定も共有いただけますか？</div>
                </div>
                <div style="align-self:flex-start; background:#f7f7f8; border:1px solid var(--border); border-radius: 12px; padding: 12px 14px; max-width: 80%;">
                  <div class="small muted">相手</div>
                  <div style="margin-top:6px;">次のステータスは作業中に更新予定です（明日AM）。</div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="grid-2" style="grid-template-columns: 1fr; gap: 10px;">
                <div class="proto-field">
                  <span class="proto-bubble">返信文を入力（プロトタイプ・送信なし）</span>
                  <label>返信（プロトタイプ）</label>
                  <textarea placeholder="メッセージを入力" style="min-height: 90px;"></textarea>
                </div>
                <div class="btnbar" style="margin-top:0;">
                  <button class="btn primary" type="button" onclick="alert('プロトタイプ：送信しません。')">送信</button>
                </div>
              </div>

              <p class="muted small" style="margin-top:12px;">
                ※この画面はUIプロトタイプです。
              </p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const role = params.get("role") || "user";
        const org = params.get("org") || "Honda（例）";
        const caseId = params.get("caseId") || "000000";
        const threadId = params.get("threadId") || "t000";

        const caseLabel = document.getElementById("caseIdLabel");
        if (caseLabel) caseLabel.textContent = caseId;
        const threadLabel = document.getElementById("threadIdLabel");
        if (threadLabel) threadLabel.textContent = threadId;

        const navCaseListLink = document.getElementById("navCaseListLink");
        if (navCaseListLink) {
          navCaseListLink.href =
            role === "admin"
              ? "./admin/admin-cases.html?role=admin&org=" + encodeURIComponent(org)
              : "./user/user-cases.html?role=user&org=" + encodeURIComponent(org);
        }

        const backToInboxBtn = document.getElementById("backToInboxBtn");
        if (backToInboxBtn) {
          backToInboxBtn.href =
            "./inbox.html?role=" + encodeURIComponent(role) + "&org=" + encodeURIComponent(org);
        }

        document.querySelectorAll("a[href*='inbox.html']").forEach((a) => {
          const url = new URL(a.href, window.location.href);
          url.searchParams.set("role", role);
          url.searchParams.set("org", org);
          a.href = url.toString();
        });
      })();
    </script>
  </body>
</html>
