<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP Prototype - トップ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="topnav">
        <div class="brand" style="flex-direction:column; align-items:flex-start; gap:4px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="pill">MVP Prototype</div>
            <div>案件管理プラットフォーム</div>
          </div>
          <div class="breadcrumb">トップ</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <a class="btn primary" href="./login.html">ログイン</a>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">ようこそ</div>
        <div class="panel-body">
          <div class="grid-2">
            <div>
              <h2 style="margin:0 0 10px 0;">案件の進行をシンプルに管理</h2>
              <p class="muted small" style="margin:0 0 12px 0;">
                これはバックエンドなしのUIプロトタイプです。トップ → ログイン → 管理者/利用者のダッシュボード（案件一覧）へ進めます。
              </p>
              <div class="btnbar">
                <a class="btn primary" href="./login.html">ログインして進む</a>
              </div>
            </div>
            <div>
              <div class="section-title" style="margin-bottom:8px;">デモで確認できること</div>
              <div class="muted small" style="margin-bottom:8px;">案件一覧（管理者 / 利用者）</div>
              <div class="muted small" style="margin-bottom:8px;">案件詳細（UIサンプル）</div>
              <div class="muted small">写真/添付（プレビュー画面）</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
