<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理者ログイン — 案件管理プラットフォーム</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./mvp.js"></script>
  </head>
  <body class="auth-page">
    <div class="auth-container">

      <!-- Back + Brand -->
      <div class="d-flex align-center justify-between" style="margin-bottom:32px;">
        <div class="auth-brand" style="margin-bottom:0;">
          <div class="auth-brand__logo">G</div>
          <div class="auth-brand__name">案件管理プラットフォーム</div>
        </div>
        <a href="./index.html" style="font-size:14px; color:var(--muted);">← トップへ</a>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">管理者ログイン</h1>
      <p class="auth-subheading">元請け管理者アカウントでログインしてください。</p>

      <!-- Login form -->
      <div class="field-group">
        <div class="field-group__item">
          <label class="field-group__label" for="adminId">管理者ID</label>
          <input
            id="adminId"
            type="text"
            placeholder="例：admin01"
            autocomplete="username"
          />
        </div>
        <div class="field-group__item">
          <label class="field-group__label" for="adminPassword">パスワード</label>
          <div class="d-flex align-center gap-sm">
            <input
              id="adminPassword"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              style="flex:1; border:none; box-shadow:none; padding:0; border-radius:0; font-size:16px; background:transparent;"
            />
            <button
              type="button"
              onclick="togglePassword('adminPassword', this)"
              style="border:none; background:none; color:var(--muted); font-size:13px; cursor:pointer; white-space:nowrap; padding:0;"
            >表示</button>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <a
        class="btn black btn--full"
        href="./admin/admin-cases.html?role=admin&org=元請け"
        onclick="if (window.mvpNotify) window.mvpNotify('管理者としてログインしました', 'success')"
        style="font-size:16px; padding:15px 20px; margin-top:8px;"
      >
        管理者としてログイン
      </a>

      <!-- Prototype note -->
      <p class="demo-note" style="justify-content:center; margin-top:16px;">
        Demo mode: 認証はサンプル動作です
      </p>

      <!-- User link -->
      <div class="auth-divider" style="margin-top:28px;">利用者の方</div>
      <div style="text-align:center;">
        <a href="./user-login.html" style="font-size:14px; color:var(--primary); font-weight:500;">
          利用者ログインページへ →
        </a>
      </div>

    </div>

    <script>
      function togglePassword(id, btn) {
        const input = document.getElementById(id);
        if (!input) return;
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "隠す";
        } else {
          input.type = "password";
          btn.textContent = "表示";
        }
      }
    </script>
  </body>
</html>
